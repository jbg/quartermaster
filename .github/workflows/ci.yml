name: CI

on:
  pull_request:
  push:

jobs:
  rust-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace

  rust-postgres-qmdb:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run qm-db tests with Postgres parity enabled
        env:
          QM_REQUIRE_POSTGRES_TESTS: "1"
          QM_POSTGRES_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: cargo test -p qm-db -- --nocapture

  rust-postgres-qmapi:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run compact qm-api Postgres household/auth suite
        env:
          QM_REQUIRE_POSTGRES_TESTS: "1"
          QM_POSTGRES_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: cargo test -p qm-api --test households -- --nocapture

  openapi-and-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Export OpenAPI
        run: cargo xtask export-openapi

      - name: Check OpenAPI drift
        run: git diff --exit-code -- openapi.json ios/Quartermaster/openapi.json

      - name: Verify release config
        run: cargo xtask verify-release-config

      - name: Seed ledger fixture
        env:
          QM_DATABASE_URL: sqlite://${{ github.workspace }}/ledger-fixture.db?mode=rwc
        run: cargo xtask seed-ledger-fixture

      - name: Verify stock ledger
        env:
          QM_DATABASE_URL: sqlite://${{ github.workspace }}/ledger-fixture.db?mode=rwc
        run: cargo xtask verify-stock-ledger

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build iOS app
        run: >-
          xcodebuild
          -project ios/Quartermaster.xcodeproj
          -scheme Quartermaster
          -configuration Release
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.2'
          -skipPackagePluginValidation
          QUARTERMASTER_ASSOCIATED_DOMAIN=ci.quartermaster.example.com
          build

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build Android app
        working-directory: android
        run: gradle :app:assembleDebug :app:testDebugUnitTest

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: volta-cli/action@v4
        with:
          node-version: "25"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install pnpm with Volta
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: volta install pnpm@10.33.2

      - name: Install web dependencies
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm install --frozen-lockfile

      - name: Generate web API client
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm -C web generate:api

      - name: Check web app
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm -C web check

      - name: Test web app
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm -C web test

      - name: Build web app
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm -C web build

      - name: Install Playwright browser
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm -C web exec playwright install --with-deps chromium

      - name: Run web browser smoke
        env:
          VOLTA_FEATURE_PNPM: "1"
        run: pnpm -C web test:e2e

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build container image
        run: docker build -t quartermaster:ci .

      - name: Smoke test container
        run: |
          docker run -d --name qm-smoke -p 18080:8080 -e QM_DATABASE_URL=sqlite:///data/data.db?mode=rwc quartermaster:ci
          trap "docker logs qm-smoke; docker rm -f qm-smoke" EXIT
          sleep 5
          curl --fail http://127.0.0.1:18080/healthz
