name: Release

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string
      release_notes:
        description: Release notes to copy into the Home Assistant App changelog
        required: false
        type: string
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing X.Y.Z release tag to publish; leave empty for validation-only build
        required: false
        default: ""
      release_notes:
        description: Release notes for Home Assistant App changelog when release_tag is set
        required: false
        default: ""
      version:
        description: Version label to use for the validation build
        required: false
        default: 0.0.0-manual

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/quartermaster

permissions:
  contents: read
  packages: write

jobs:
  build-platform:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: linux-amd64
            hass_arch: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            platform_slug: linux-arm64
            hass_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
            image_tag="$release_tag"
            version="$image_tag"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
            image_tag="$release_tag"
            version="$image_tag"
          else
            image_tag="manual-${{ github.run_number }}"
            version="${{ inputs.version }}"
          fi
          echo "tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build validation image
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: quartermaster:${{ steps.meta.outputs.tag }}-${{ matrix.platform_slug }}
          load: ${{ matrix.platform == 'linux/amd64' }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            HASS_ARCH=${{ matrix.hass_arch }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}

      - name: Build and push image by digest
        if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            HASS_ARCH=${{ matrix.hass_arch }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.created }}

      - name: Export digest
        if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
        shell: bash
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Smoke validation image
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == '' && matrix.platform == 'linux/amd64'
        shell: bash
        run: |
          docker run -d --name qm-smoke -p 18080:8080 quartermaster:${{ steps.meta.outputs.tag }}-${{ matrix.platform_slug }}
          trap "docker logs qm-smoke; docker rm -f qm-smoke" EXIT
          sleep 5
          curl --fail http://127.0.0.1:18080/healthz
          test "$(docker inspect quartermaster:${{ steps.meta.outputs.tag }}-${{ matrix.platform_slug }} --format '{{ index .Config.Labels "io.hass.version" }}')" = "${{ steps.meta.outputs.version }}"
          test "$(docker inspect quartermaster:${{ steps.meta.outputs.tag }}-${{ matrix.platform_slug }} --format '{{ index .Config.Labels "io.hass.type" }}')" = "app"
          test "$(docker inspect quartermaster:${{ steps.meta.outputs.tag }}-${{ matrix.platform_slug }} --format '{{ index .Config.Labels "io.hass.arch" }}')" = "${{ matrix.hass_arch }}"

  publish-manifest:
    if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
    runs-on: ubuntu-24.04
    needs:
      - build-platform
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi
          image_tag="$release_tag"
          echo "tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        shell: bash
        run: |
          digests="$(printf '${{ env.IMAGE_NAME }}@sha256:%s ' /tmp/digests/* | sed 's#/tmp/digests/##g')"
          docker buildx imagetools create \
            --tag "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            $digests

      - name: Smoke released image
        shell: bash
        run: |
          docker run -d --name qm-smoke -p 18080:8080 "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          trap "docker logs qm-smoke; docker rm -f qm-smoke" EXIT
          sleep 5
          curl --fail http://127.0.0.1:18080/healthz
          test "$(docker inspect "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" --format '{{ index .Config.Labels "io.hass.version" }}')" = "${{ steps.meta.outputs.version }}"
          test "$(docker inspect "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" --format '{{ index .Config.Labels "io.hass.type" }}')" = "app"
          test "$(docker inspect "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}" --format '{{ index .Config.Labels "io.hass.arch" }}')" = "amd64"

  publish-testflight:
    if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Compute iOS release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi
          version="${release_tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Import App Store distribution certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

      - name: Download App Store provisioning profile
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: ${{ vars.QUARTERMASTER_IOS_BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Archive and export iOS app
        id: archive
        shell: bash
        env:
          QUARTERMASTER_IOS_DEVELOPMENT_TEAM: ${{ vars.QUARTERMASTER_IOS_DEVELOPMENT_TEAM }}
          QUARTERMASTER_IOS_BUNDLE_ID: ${{ vars.QUARTERMASTER_IOS_BUNDLE_ID }}
          QUARTERMASTER_ASSOCIATED_DOMAIN: ${{ vars.QUARTERMASTER_ASSOCIATED_DOMAIN }}
        run: |
          ipa_path="$(
            sh ios/scripts/archive-app.sh \
              --version "${{ steps.meta.outputs.version }}" \
              --build-number "${{ steps.meta.outputs.build_number }}" \
              --archive-path "$RUNNER_TEMP/Quartermaster.xcarchive" \
              --export-path "$RUNNER_TEMP/quartermaster-ipa" \
              --derived-data-path "$RUNNER_TEMP/qm-ios-derived-data" \
              --print-ipa-path | tail -n 1
          )"
          echo "ipa_path=$ipa_path" >> "$GITHUB_OUTPUT"

      - name: Upload iOS app to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.archive.outputs.ipa_path }}
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          release-notes: ${{ github.event.release.body || inputs.release_notes }}

  update-home-assistant-app:
    if: github.event_name == 'release' || github.event_name == 'workflow_call' || inputs.release_tag != ''
    runs-on: ubuntu-24.04
    needs:
      - publish-manifest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: actions/checkout@v5
        with:
          repository: jbg/quartermaster-home-assistant-apps
          token: ${{ secrets.HA_APPS_REPO_TOKEN }}
          path: ha-apps

      - name: Update Home Assistant app repository
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.publish-manifest.outputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          RELEASE_NOTES: ${{ github.event.release.body || inputs.release_notes }}
        run: bash scripts/update-ha-app-repo.sh ha-apps

      - name: Commit Home Assistant app release
        working-directory: ha-apps
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "chore: release Quartermaster ${{ github.event.release.tag_name || inputs.release_tag }}"
          git tag "quartermaster-${{ github.event.release.tag_name || inputs.release_tag }}"
          git push
          git push origin "quartermaster-${{ github.event.release.tag_name || inputs.release_tag }}"
