name: Quartermaster
options:
  bundleIdPrefix: com.jasperhugo
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
  groupSortPosition: top
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: "42J2SSX5SM"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  Quartermaster:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Quartermaster
        excludes:
          - Generated/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasperhugo.quartermaster
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: Quartermaster
        INFOPLIST_KEY_NSCameraUsageDescription: "Quartermaster scans barcodes to look up products when you add items to your inventory."
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
