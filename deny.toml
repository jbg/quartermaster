[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "all"
ignore = [
    # Transitive via brother_ql -> image -> ravif -> rav1e; no fixed upgrade is available.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "NCSA",
    "Unicode-3.0",
    "Zlib",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "allow"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "simplest-path"
workspace-default-features = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
